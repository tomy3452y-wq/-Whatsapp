<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .container {
      position: relative;
      height: 100dvh; /* современная корректная высота */
      width: 100%;
    }

    /* Картинка верхние 2/3 */
    .hero {
      position: absolute;
      top: 0;
      width: 100%;
      height: 70dvh;
      background-image: url('IMG_0849.jpeg'); /* <-- твой jpeg */
      background-size: cover;
      background-position: center;
    }

    /* Более красивый градиент */
    .hero::after {
      content: "";
      position: absolute;
      bottom: -1px;
      width: 100%;
      height: 50%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.4) 40%,
        rgba(0,0,0,0.8) 70%,
        rgba(0,0,0,1) 100%
      );
    }

    /* Кнопка */
    .btn {
      position: absolute;
      top: 75%; /* на ~15% ниже */
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      background: linear-gradient(270deg, #ff4d8d, #ff0066, #ff4d8d);
      background-size: 400% 400%;
      animation: gradientMove 6s ease infinite;
      box-shadow: 0 15px 40px rgba(255, 0, 102, 0.4);
      transition: transform 0.2s ease;
    }

    .btn:active {
      transform: translateX(-50%) scale(0.96);
    }

    /* Переливание */
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="hero"></div>

    <a href="https://sumar.top/click?o=2&a=10103" class="btn">
      Hier klicken 💋
    </a>
  </div>
</body>
</html>
