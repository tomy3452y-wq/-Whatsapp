<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

html,body{
  height:100%;
  overflow:hidden;
  background:black;
}

.container{
  position:relative;
  height:100dvh;
  width:100%;
}

/* Картинка */
.hero{
  position:absolute;
  top:0;
  width:100%;
  height:70dvh;
  background-image:url('IMG_0849.jpeg'); /* твой jpeg */
  background-size:cover;
  background-position:center;
}

/* Красивый плавный градиент */
.hero::after{
  content:"";
  position:absolute;
  bottom:-1px;
  width:100%;
  height:60%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.35) 40%,
    rgba(0,0,0,0.75) 75%,
    rgba(0,0,0,1) 100%
  );
}

/* СТЕКЛЯННАЯ КНОПКА */
.btn{
  position:absolute;
  top:78%;   /* ниже */
  left:50%;
  transform:translateX(-50%);
  width:85%;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  color:white;
  text-decoration:none;
  border-radius:18px;

  /* стекло */
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.4),
    0 0 20px rgba(255,0,120,0.25);

  animation:float 4s ease-in-out infinite,
            glow 3s ease-in-out infinite alternate;
  transition:transform 0.2s ease;
}

/* лёгкое покачивание */
@keyframes float{
  0%{ transform:translate(-50%,0px); }
  50%{ transform:translate(-50%,-6px); }
  100%{ transform:translate(-50%,0px); }
}

/* мягкое переливание свечения */
@keyframes glow{
  0%{
    box-shadow:
      0 8px 30px rgba(0,0,0,0.4),
      0 0 10px rgba(255,0,120,0.2);
  }
  100%{
    box-shadow:
      0 12px 40px rgba(0,0,0,0.5),
      0 0 30px rgba(255,0,120,0.6);
  }
}

.btn:active{
  transform:translate(-50%,0) scale(0.95);
}

</style>
</head>

<body>
<div class="container">
  <div class="hero"></div>

  <a href="https://sumar.top/click?o=2&a=10103" class="btn">
    Hier klicken 💋
  </a>

</div>
</body>
</html>
