<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Landing</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden; /* без скролла */
      background: black;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Верхние 2/3 — картинка */
    .hero {
      position: absolute;
      top: 0;
      width: 100%;
      height: 66.66vh;
      background-image: url('your-image.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Градиент перехода в черный */
    .hero::after {
      content: "";
      position: absolute;
      bottom: -1px;
      width: 100%;
      height: 40%;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 100%);
    }

    /* Кнопка */
    .btn {
      position: absolute;
      top: 60%;
      width: 85%;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ff4d8d, #ff0066);
      box-shadow: 0 10px 30px rgba(255, 0, 102, 0.4);
      transition: 0.3s ease;
    }

    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 5px 15px rgba(255, 0, 102, 0.6);
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="hero"></div>

    <a href="#" class="btn">
      Hier klicken 💋
    </a>
  </div>
</body>
</html>
